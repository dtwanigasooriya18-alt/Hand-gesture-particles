<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Gesture Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video-container { position: absolute; bottom: 10px; right: 10px; width: 200px; transform: scaleX(-1); border: 2px solid #444; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Hand Gesture Particles</h2>
        <p>Pinch to expand | Move hand to rotate | Vertical for heart/sphere</p>
        <p id="current-shape">Current Shape: Sphere</p>
    </div>
    <video id="webcam" autoplay playsinline style="display:none;"></video>
    <canvas id="video-container"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        // --- Configuration ---
        const PARTICLE_COUNT = 5000;
        let handLandmarker;
        let lastVideoTime = -1;
        let currentShape = 'sphere';
        
        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        camera.position.z = 5;

        // --- Particle System ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
            colors[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- Shape Templates ---
        function createSphere() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                targetPositions[i * 3] = 2 * Math.cos(theta) * Math.sin(phi);
                targetPositions[i * 3 + 1] = 2 * Math.sin(theta) * Math.sin(phi);
                targetPositions[i * 3 + 2] = 2 * Math.cos(phi);
            }
        }

        function createHeart() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const t = Math.random() * Math.PI * 2;
                // Parametric heart equations
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                targetPositions[i * 3] = x * 0.15;
                targetPositions[i * 3 + 1] = y * 0.15;
                targetPositions[i * 3 + 2] = (Math.random() - 0.5) * 2;
            }
        }

        createSphere(); // Initial shape

        // --- MediaPipe Hand Detection Setup ---
        async function initHandTracking() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
                runningMode: "VIDEO",
                numHands: 1
            });
            startCamera();
        }

        async function startCamera() {
            const video = document.getElementById("webcam");
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.addEventListener("loadeddata", predictWebcam);
        }

        async function predictWebcam() {
            const video = document.getElementById("webcam");
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                
                if (results.landmarks && results.landmarks.length > 0) {
                    processGestures(results.landmarks[0]);
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function processGestures(landmarks) {
            // 1. Expansion via Pinch (Distance between Thumb and Index)
            const thumb = landmarks[4];
            const index = landmarks[8];
            const distance = Math.hypot(thumb.x - index.x, thumb.y - index.y);
            
            const scale = THREE.MathUtils.mapLinear(distance, 0.05, 0.3, 0.5, 3);
            particleSystem.scale.set(scale, scale, scale);

            // 2. Movement (Follow the palm)
            const palm = landmarks[9];
            particleSystem.rotation.y = (palm.x - 0.5) * 4;
            particleSystem.rotation.x = (palm.y - 0.5) * 4;

            // 3. Template Switch (Vertical for heart/sphere only)
            if (palm.y < 0.5 && currentShape !== 'heart') {
                createHeart();
                currentShape = 'heart';
                document.getElementById('current-shape').innerText = "Current Shape: Heart";
            } else if (palm.y >= 0.5 && currentShape !== 'sphere') {
                createSphere();
                currentShape = 'sphere';
                document.getElementById('current-shape').innerText = "Current Shape: Sphere";
            }

            // 4. Color Shift
            material.color.setHSL(distance * 2, 0.8, 0.5);
        }

        // --- Animation Loop ---
        function animate() {
            const posAttr = geometry.attributes.position;
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                // Smooth Lerp toward target positions
                posAttr.array[i] += (targetPositions[i] - posAttr.array[i]) * 0.05;
            }
            posAttr.needsUpdate = true;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        initHandTracking();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
